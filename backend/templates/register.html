<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper IQ — Register</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0f14;
            font-family: 'Courier New', monospace;
            color: #e2e8f0;
        }

        .card {
            background: #161b27;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 0.25rem;
            color: #68d391;
            letter-spacing: 0.05em;
        }

        .sub {
            font-size: 0.8rem;
            color: #718096;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: #a0aec0;
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            background: #0d0f14;
            border: 1px solid #2d3748;
            border-radius: 5px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #68d391;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #276749;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #38a169;
        }

        .footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #718096;
        }

        .footer a {
            color: #68d391;
            text-decoration: none;
        }

        .error {
            color: #fc8181;
            font-size: 0.82rem;
            margin-bottom: 1rem;
            padding: 0.5rem 0.75rem;
            background: #2d1c1c;
            border-radius: 4px;
        }

        .success {
            color: #68d391;
            font-size: 0.82rem;
            margin-bottom: 1rem;
            padding: 0.5rem 0.75rem;
            background: #1c2d1c;
            border-radius: 4px;
        }

        .hint {
            font-size: 0.72rem;
            color: #4a5568;
            margin-top: -0.9rem;
            margin-bottom: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Paper IQ</h1>
        <p class="sub">Research Navigator — Create Account</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="success">{{ success }}</div>
        {% endif %}
        <form method="POST" action="/api/v1/auth/register-form">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Jane Smith" />
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com" />
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••" minlength="8" />
            <p class="hint">Minimum 8 characters</p>
            <label for="invite_code">Invite Code</label>
            <input type="text" id="invite_code" name="invite_code" required placeholder="XXXX-XXXX" />
            <button type="submit">Create Account</button>
        </form>
        <div class="footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</body>

</html>
